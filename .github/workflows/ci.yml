name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run clean setup
        run: |
          chmod +x clean_setup.sh
          bash clean_setup.sh

      - name: Run pre-commit hooks
        run: |
          source suisensha-venv/bin/activate
          pre-commit run --all-files

  test:
    name: Tests (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run clean setup (Linux)
        if: runner.os != 'Windows'
        run: |
          chmod +x clean_setup.sh
          bash clean_setup.sh

      - name: Run clean setup (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\clean_setup.ps1

      - name: Run test suite (Linux)
        if: runner.os != 'Windows'
        run: |
          source suisensha-venv/bin/activate
          python -m pytest tests/ -v --tb=short

      - name: Run test suite (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\suisensha-venv\Scripts\Activate.ps1
          python -m pytest tests/ -v --tb=short
